<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gowlung Digital</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/header.css">

</head>

<body>

<!-- HEADER CONTAINER -->
<!-- script header dibawah -->
<div id="header"></div>


<!-- HERO -->
<div class="hero">

    <!-- BACKGROUND IMAGE (fallback / layer tambahan) -->
    <div class="hero-bg"></div>

    <!-- OVERLAY TEXT -->
        <div class="overlay">
            <div class="overlay-title">
                <img src="images/logo-crop-bulat.png" alt="Logo" class="overlay-logo">
                <h1>INNOVATIVE DIGITAL SOLUTIONS</h1>
            </div>

            <p>Penghubung Inovasi dengan Solusi Masa Depan</p>
        </div>

</div>

<!-- SERVICES -->
<div id="services-placeholder"></div>

<script>
fetch('services.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('services-placeholder').innerHTML = data;
    });
</script>


<!-- SKRIP FOOTER -->
<div id="footer-placeholder"></div>
<script>
fetch('footer.html')
    .then(response => response.text())
    .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
    });
</script>


<!-- LOAD HEADER + NAVBAR SCRIPT -->
<script>

fetch("header.html")
.then(response => response.text())
.then(data => {

    document.getElementById("header").innerHTML = data;

    // JALANKAN SETELAH HEADER SELESAI DILOAD
    const navbar = document.getElementById("navbar");

    let lastScroll = 0;

    window.addEventListener("scroll", () => {

        let currentScroll = window.pageYOffset;

        // SHRINK
        if(currentScroll > 50){
            navbar.classList.add("shrink");
        }else{
            navbar.classList.remove("shrink");
        }

        // HIDE NAVBAR SAAT SCROLL KE BAWAH
        if(currentScroll > lastScroll && currentScroll > 120){

            navbar.classList.add("hide");

        }else{

            navbar.classList.remove("hide");

        }

        lastScroll = currentScroll;

    });

});

</script>



</body>
</html>
